# GPU Network Tuner — sets MTU 9000 and TCP buffer sysctls on GPU nodes
# before workloads schedule, preventing NFS performance degradation.
# See: https://docs.digitalocean.com/products/kubernetes/how-to/use-nfs-storage/#optimize-nfs-performance-on-gpu-nodes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-network-tuner
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-network-tuner
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-network-tuner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-network-tuner
subjects:
  - kind: ServiceAccount
    name: gpu-network-tuner
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-network-tuner
  namespace: kube-system
  labels:
    app: gpu-network-tuner
spec:
  selector:
    matchLabels:
      app: gpu-network-tuner
  template:
    metadata:
      labels:
        app: gpu-network-tuner
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: doks.digitalocean.com/gpu-brand
                    operator: In
                    values:
                      - amd
                      - nvidia
      tolerations:
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: node.digitalocean.com/network-not-tuned
          operator: Exists
          effect: NoSchedule
      hostNetwork: true
      hostPID: true
      serviceAccountName: gpu-network-tuner
      volumes:
        - name: host-kubectl
          hostPath:
            path: /usr/bin/kubectl
            type: File
      initContainers:
        - name: network-tuner
          image: busybox:stable
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Applying sysctl tuning ==="
              sysctl -w net.core.rmem_max=16777216
              sysctl -w net.core.wmem_max=16777216
              sysctl -w net.ipv4.tcp_rmem="4096 87380 16777216"
              sysctl -w net.ipv4.tcp_wmem="4096 65536 16777216"

              echo "=== Persisting sysctl settings ==="
              cat <<'SYSCTL' | nsenter -t 1 -m -- tee /etc/sysctl.d/99-gpu-network-tuning.conf > /dev/null
              net.core.rmem_max=16777216
              net.core.wmem_max=16777216
              net.ipv4.tcp_rmem=4096 87380 16777216
              net.ipv4.tcp_wmem=4096 65536 16777216
              SYSCTL

              echo "=== Persisting MTU 9000 for VPC interface via netplan ==="
              nsenter -t 1 -m -- sed -i '/set-name.*eth1/{n;s/mtu: 1500/mtu: 9000/}' /etc/netplan/50-cloud-init.yaml
              echo "=== Applying netplan ==="
              nsenter -t 1 -m -- netplan apply
              echo "=== Fallback: setting MTU directly ==="
              ip link set eth1 mtu 9000 || true

              echo "=== Verifying settings ==="
              sysctl net.core.rmem_max net.core.wmem_max net.ipv4.tcp_rmem net.ipv4.tcp_wmem
              ip link show eth1 | grep mtu
              echo "=== Network tuning complete ==="
          securityContext:
            privileged: true
        - name: remove-taint
          image: busybox:stable
          command: ["/bin/sh", "-c"]
          args: ["/host-bin/kubectl taint nodes $(NODE_NAME) node.digitalocean.com/network-not-tuned:NoSchedule- || true"]
          volumeMounts:
            - name: host-kubectl
              mountPath: /host-bin/kubectl
              readOnly: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      containers:
        - name: pause
          image: busybox:stable
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
            limits:
              cpu: 10m
              memory: 10Mi
