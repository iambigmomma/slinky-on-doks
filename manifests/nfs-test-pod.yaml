# NFS test pod — validates read/write as non-root (root squash check)
apiVersion: v1
kind: Pod
metadata:
  name: nfs-test
  namespace: slurm
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: nfs-vol
          mountPath: /mnt/nfs
  volumes:
    - name: nfs-vol
      persistentVolumeClaim:
        claimName: slurm-nfs-pvc
