apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-dashboard
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
data:
  slurm-cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "mappings": []
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Total Nodes",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_total or vector(0)",
              "legendFormat": "Total"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Idle Nodes",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_idle or vector(0)",
              "legendFormat": "Idle"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Allocated Nodes",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_alloc or vector(0)",
              "legendFormat": "Allocated"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Down Nodes",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_down or vector(0)",
              "legendFormat": "Down"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 5 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Running Jobs",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_jobs_running or vector(0)",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "yellow", "value": null },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 5 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto"
          },
          "title": "Pending Jobs",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_jobs_pending or vector(0)",
              "legendFormat": "Pending"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "title": "Node States",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 30,
                "lineWidth": 2,
                "stacking": { "mode": "normal" },
                "spanNulls": true
              }
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
          "id": 7,
          "options": { "legend": { "displayMode": "table", "placement": "right" } },
          "title": "Node States Over Time",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_idle",
              "legendFormat": "Idle"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_alloc",
              "legendFormat": "Allocated"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_mixed",
              "legendFormat": "Mixed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_down",
              "legendFormat": "Down"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_nodes_drain",
              "legendFormat": "Drain"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 102,
          "title": "Job Activity",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "spanNulls": true
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 8,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Jobs Over Time",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_jobs_running",
              "legendFormat": "Running"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_jobs_pending",
              "legendFormat": "Pending"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_jobs_completing",
              "legendFormat": "Completing"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "stacking": { "mode": "normal" }
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 9,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Job Outcomes Rate",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(slurm_jobs_completed_total[5m])",
              "legendFormat": "Completed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(slurm_jobs_failed_total[5m])",
              "legendFormat": "Failed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(slurm_jobs_cancelled_total[5m])",
              "legendFormat": "Cancelled"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 103,
          "title": "Partitions",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "spanNulls": true
              }
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "id": 10,
          "options": { "legend": { "displayMode": "table", "placement": "right" } },
          "title": "Per-Partition Job Counts",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_partition_jobs_running",
              "legendFormat": "{{partition}} running"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_partition_jobs_pending",
              "legendFormat": "{{partition}} pending"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 36 },
          "id": 104,
          "title": "Resources",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 80 },
                  { "color": "red", "value": 95 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 37 },
          "id": 11,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Cluster CPU Allocation",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(slurm_cpus_alloc / slurm_cpus_total) * 100 or vector(0)",
              "legendFormat": "CPU %"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 80 },
                  { "color": "red", "value": 95 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 37 },
          "id": 12,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Cluster Memory Allocation",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(slurm_mem_alloc / slurm_mem_total) * 100 or vector(0)",
              "legendFormat": "Memory %"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 43 },
          "id": 105,
          "title": "Scheduler",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 44 },
          "id": 13,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Scheduler Cycle Time",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_scheduler_cycle_last / 1e6",
              "legendFormat": "Last Cycle"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_scheduler_cycle_mean / 1e6",
              "legendFormat": "Mean Cycle"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": true
              }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 44 },
          "id": 14,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "title": "Backfill Stats",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_scheduler_backfill_last_depth",
              "legendFormat": "Last Depth"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "slurm_scheduler_backfill_last_cycle / 1e6",
              "legendFormat": "Last Cycle (s)"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["slurm", "slinky", "hpc"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Slurm Cluster Overview",
      "uid": "slurm-cluster-overview"
    }
