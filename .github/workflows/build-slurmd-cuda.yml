name: Build slurmd-cuda

on:
  push:
    branches: ["main", "feat/nvidia-b300-poc"]
    paths:
      - "docker/slurmd-cuda/**"
  workflow_dispatch:
    inputs:
      cuda_image:
        description: "NVIDIA CUDA devel base image"
        default: "nvidia/cuda:12.6.3-devel-ubuntu24.04"
      image_tag:
        description: "Output image tag"
        default: "25.11-cuda12.6"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/slurmd-cuda

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: meta
        run: |
          CUDA_IMAGE="${{ github.event.inputs.cuda_image || 'nvidia/cuda:12.6.3-devel-ubuntu24.04' }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag || '25.11-cuda12.6' }}"
          echo "cuda_image=${CUDA_IMAGE}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/slurmd-cuda
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            CUDA_IMAGE=${{ steps.meta.outputs.cuda_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
