# kube-prometheus-stack values for Slinky PoC
# All control-plane components → management nodes
# node-exporter → all nodes (DaemonSet)

# ── YAML anchors for DRY scheduling ──────────────────────────────────────────
x-management-node-selector: &mgmtNodeSelector
  role: management

x-management-toleration: &mgmtToleration
  - key: role
    value: management
    effect: NoSchedule

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    nodeSelector: *mgmtNodeSelector
    tolerations: *mgmtToleration
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    retention: 7d
    storageSpec: {}  # ephemeral for PoC

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    nodeSelector: *mgmtNodeSelector
    tolerations: *mgmtToleration
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  nodeSelector: *mgmtNodeSelector
  tolerations: *mgmtToleration
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# ── Kube-state-metrics ────────────────────────────────────────────────────────
kube-state-metrics:
  nodeSelector: *mgmtNodeSelector
  tolerations: *mgmtToleration
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

# ── Prometheus Operator ───────────────────────────────────────────────────────
prometheusOperator:
  nodeSelector: *mgmtNodeSelector
  tolerations: *mgmtToleration
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  admissionWebhooks:
    patch:
      nodeSelector: *mgmtNodeSelector
      tolerations: *mgmtToleration

# ── Node Exporter — DaemonSet on ALL nodes ────────────────────────────────────
prometheus-node-exporter:
  tolerations:
    - operator: Exists
