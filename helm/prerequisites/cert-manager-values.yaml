# cert-manager values — schedule all components on management nodes

# Controller (top-level keys)
nodeSelector:
  role: management
tolerations:
  - key: role
    value: management
    effect: NoSchedule

webhook:
  nodeSelector:
    role: management
  tolerations:
    - key: role
      value: management
      effect: NoSchedule

cainjector:
  nodeSelector:
    role: management
  tolerations:
    - key: role
      value: management
      effect: NoSchedule

startupapicheck:
  nodeSelector:
    role: management
  tolerations:
    - key: role
      value: management
      effect: NoSchedule
